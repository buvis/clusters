---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: snapcast-watchdog
  namespace: radio
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: snapcast-watchdog
  namespace: radio
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments/status"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: snapcast-watchdog
  namespace: radio
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: snapcast-watchdog
subjects:
  - kind: ServiceAccount
    name: snapcast-watchdog
    namespace: radio
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: snapcast-watchdog
  namespace: radio
spec:
  schedule: "*/2 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 60
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 600
      template:
        spec:
          serviceAccountName: snapcast-watchdog
          restartPolicy: Never
          containers:
            - name: watchdog
              image: alpine/k8s:1.35.4@sha256:d9aeef2665287b9918bc57c539ba95382ba4c8d52c8b1310df5666a89d9a3d04
              env:
                - name: MOPIDY_URL
                  value: "http://mopidy:6680/mopidy/rpc"
                - name: SNAPSERVER_URL
                  value: "http://snapserver/jsonrpc"
                - name: NTFY_URL
                  value: "http://ntfy.smarthome/radio-watchdog"
              envFrom:
                - secretRef:
                    name: snapcast-watchdog-ntfy
              command:
                - /bin/sh
                - -c
                - |
                  set -u

                  # We probe mopidy's own playback state as the canary.
                  # Reasons:
                  #  - It directly tells us whether the radio is meant to be playing.
                  #  - mopidy's HTTP RPC is reliable; snapserver's HTTP API hangs in
                  #    some states (e.g. when input stream is paused) which previously
                  #    caused false-positive restarts.
                  #  - The user's manual recovery trigger is exactly "mopidy stopped
                  #    playing", which is what this probe detects.
                  probe_mopidy() {
                    # Returns one of: playing | paused | stopped | unreachable
                    body=$(curl -fsS --max-time 5 \
                      -H 'Content-Type: application/json' \
                      -d '{"jsonrpc":"2.0","id":1,"method":"core.playback.get_state"}' \
                      "$MOPIDY_URL" 2>/dev/null)
                    if [ -z "$body" ]; then
                      echo "unreachable"
                      return
                    fi
                    s=$(echo "$body" | jq -r '.result // empty' 2>/dev/null)
                    if [ -z "$s" ]; then
                      echo "unreachable"
                    else
                      echo "$s"
                    fi
                  }

                  # Used only for post-restart verification. snapserver "status:playing"
                  # confirms audio is actually flowing end-to-end (mopidy is generating
                  # data AND snapserver is receiving it).
                  probe_snapserver() {
                    body=$(curl -fsS --max-time 5 \
                      -H 'Content-Type: application/json' \
                      -d '{"id":1,"jsonrpc":"2.0","method":"Server.GetStatus"}' \
                      "$SNAPSERVER_URL" 2>/dev/null)
                    if [ -z "$body" ]; then
                      echo "unreachable"
                      return
                    fi
                    s=$(echo "$body" | jq -r '.result.streams[0].status // empty' 2>/dev/null)
                    if [ -z "$s" ]; then
                      echo "unreachable"
                    else
                      echo "$s"
                    fi
                  }

                  notify() {
                    title="$1"; priority="$2"; tags="$3"; body="$4"
                    curl -fsS --max-time 5 \
                      -H "Authorization: Bearer ${NTFY_TOKEN:-}" \
                      -H "Title: $title" \
                      -H "Priority: $priority" \
                      -H "Tags: $tags" \
                      -d "$body" \
                      "$NTFY_URL" >/dev/null 2>&1 || true
                  }

                  # Two probes 15s apart on the mopidy state. Restart if both
                  # report anything other than "playing".
                  m1=$(probe_mopidy)
                  echo "mopidy probe1: $m1"
                  if [ "$m1" = "playing" ]; then
                    exit 0
                  fi

                  sleep 15
                  m2=$(probe_mopidy)
                  echo "mopidy probe2: $m2"
                  if [ "$m2" = "playing" ]; then
                    exit 0
                  fi

                  echo "mopidy not playing twice (m1=$m1, m2=$m2), restarting"
                  notify "snapcast-watchdog" "default" "warning,radio" \
                    "Mopidy not playing (m1=$m1, m2=$m2). Restarting snapserver, then mopidy."

                  # Restart in order: snapserver first, then mopidy. Always attempt
                  # mopidy even if snapserver wait fails — half a recovery is worse
                  # than full attempt because mopidy's tcpclientsink to old snapserver
                  # is dead and won't auto-reconnect.
                  kubectl -n radio rollout restart deployment/snapserver || true
                  kubectl -n radio rollout status deployment/snapserver --timeout=120s || \
                    echo "warn: snapserver rollout status failed (continuing anyway)"

                  kubectl -n radio rollout restart deployment/mopidy || true
                  kubectl -n radio rollout status deployment/mopidy --timeout=120s || \
                    echo "warn: mopidy rollout status failed (continuing anyway)"

                  # Give mopidy time to reconnect to snapserver and start playback
                  # (defaultplaylist autoplay should kick in on mopidy startup)
                  sleep 30
                  m_after=$(probe_mopidy)
                  ss_after=$(probe_snapserver)
                  echo "after restart: mopidy=$m_after snapserver=$ss_after"

                  if [ "$m_after" = "playing" ] && [ "$ss_after" = "playing" ]; then
                    notify "snapcast-watchdog" "low" "white_check_mark,radio" \
                      "Recovered. Stream is now playing."
                    exit 0
                  fi

                  notify "snapcast-watchdog" "high" "rotating_light,radio" \
                    "Restart did not recover (mopidy=$m_after, snapserver=$ss_after). Manual intervention needed."
                  exit 1
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 128Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
