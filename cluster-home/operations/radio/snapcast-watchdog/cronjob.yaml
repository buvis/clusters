---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: snapcast-watchdog
  namespace: radio
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: snapcast-watchdog
  namespace: radio
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments/status"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: snapcast-watchdog
  namespace: radio
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: snapcast-watchdog
subjects:
  - kind: ServiceAccount
    name: snapcast-watchdog
    namespace: radio
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: snapcast-watchdog
  namespace: radio
spec:
  schedule: "*/2 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 60
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 600
      template:
        spec:
          serviceAccountName: snapcast-watchdog
          restartPolicy: Never
          containers:
            - name: watchdog
              image: alpine/k8s:1.35.4@sha256:d9aeef2665287b9918bc57c539ba95382ba4c8d52c8b1310df5666a89d9a3d04
              env:
                - name: MOPIDY_URL
                  value: "http://mopidy:6680/mopidy/rpc"
                - name: SNAPSERVER_URL
                  value: "http://snapserver/jsonrpc"
                - name: NTFY_URL
                  value: "http://ntfy.smarthome/radio-watchdog"
              envFrom:
                - secretRef:
                    name: snapcast-watchdog-ntfy
              command:
                - /bin/sh
                - -c
                - |
                  set -u

                  # Wait briefly so the fresh CronJob pod's CNI/Cilium routing
                  # is fully established before the first probe (avoids cold-start
                  # races where curl can fail to connect to the service IP).
                  sleep 3

                  # probe_mopidy returns: playing | paused | stopped | unreachable
                  # Logs curl stderr to stderr on failure so we can diagnose later.
                  probe_mopidy() {
                    err_log=$(mktemp)
                    body=$(curl -fsS --max-time 5 \
                      -H 'Content-Type: application/json' \
                      -d '{"jsonrpc":"2.0","id":1,"method":"core.playback.get_state"}' \
                      "$MOPIDY_URL" 2>"$err_log")
                    rc=$?
                    if [ -z "$body" ]; then
                      echo "[probe_mopidy] curl rc=$rc err: $(tr '\n' ' ' < "$err_log")" >&2
                      rm -f "$err_log"
                      echo "unreachable"
                      return
                    fi
                    rm -f "$err_log"
                    s=$(echo "$body" | jq -r '.result // empty' 2>/dev/null)
                    [ -z "$s" ] && echo "unreachable" || echo "$s"
                  }

                  # probe_snapserver returns: playing | idle | unreachable
                  # Retries up to 3x to cover transient cold-start / routing races.
                  probe_snapserver() {
                    err_log=$(mktemp)
                    for attempt in 1 2 3; do
                      body=$(curl -fsS --max-time 8 \
                        -H 'Content-Type: application/json' \
                        -d '{"id":1,"jsonrpc":"2.0","method":"Server.GetStatus"}' \
                        "$SNAPSERVER_URL" 2>"$err_log")
                      rc=$?
                      if [ -n "$body" ]; then
                        s=$(echo "$body" | jq -r '.result.streams[0].status // empty' 2>/dev/null)
                        if [ -n "$s" ]; then
                          rm -f "$err_log"
                          echo "$s"
                          return
                        fi
                      fi
                      echo "[probe_snapserver] attempt $attempt curl rc=$rc err: $(tr '\n' ' ' < "$err_log")" >&2
                      : > "$err_log"
                      sleep 2
                    done
                    rm -f "$err_log"
                    echo "unreachable"
                  }

                  # is_unhealthy: returns 0 if a probe-pair indicates real trouble,
                  # 1 (= healthy) otherwise. Sets globals $m and $s for caller.
                  # Definitions:
                  #   - mopidy != "playing"  → unhealthy (user paused/mopidy crashed)
                  #   - snapserver = "idle"  → unhealthy (mopidy thinks it plays
                  #                            but no audio reaches snapserver)
                  #   - snapserver = "unreachable" → IGNORED (API flakiness, not a
                  #                            stream problem; mopidy's view wins)
                  is_unhealthy() {
                    m=$(probe_mopidy)
                    s=$(probe_snapserver)
                    echo "  mopidy=$m  snapserver=$s"
                    [ "$m" != "playing" ] && return 0
                    [ "$s" = "idle" ] && return 0
                    return 1
                  }

                  notify() {
                    title="$1"; priority="$2"; tags="$3"; body="$4"
                    if curl -fsS --max-time 10 \
                         -H "Authorization: Bearer ${NTFY_TOKEN:-}" \
                         -H "Title: $title" \
                         -H "Priority: $priority" \
                         -H "Tags: $tags" \
                         -d "$body" \
                         "$NTFY_URL" >/dev/null 2>&1; then
                      echo "ntfy: sent ($priority) -- $body"
                    else
                      echo "ntfy: FAILED to send ($priority) -- $body"
                    fi
                  }

                  echo "probe1:"
                  if ! is_unhealthy; then
                    exit 0
                  fi
                  m1="$m"; s1="$s"

                  sleep 15
                  echo "probe2:"
                  if ! is_unhealthy; then
                    exit 0
                  fi
                  m2="$m"; s2="$s"

                  echo "unhealthy in 2 probes (mopidy: $m1->$m2, snapserver: $s1->$s2), restarting"
                  notify "snapcast-watchdog" "default" "warning,radio" \
                    "Stream stuck (mopidy: $m1→$m2, snapserver: $s1→$s2). Restarting snapserver, then mopidy."

                  # Restart in order: snapserver first, then mopidy. Always attempt
                  # mopidy even if snapserver wait fails — half a recovery is worse
                  # than full attempt because mopidy's tcpclientsink to old snapserver
                  # is dead and won't auto-reconnect.
                  kubectl -n radio rollout restart deployment/snapserver || true
                  kubectl -n radio rollout status deployment/snapserver --timeout=120s || \
                    echo "warn: snapserver rollout status failed (continuing anyway)"

                  kubectl -n radio rollout restart deployment/mopidy || true
                  kubectl -n radio rollout status deployment/mopidy --timeout=120s || \
                    echo "warn: mopidy rollout status failed (continuing anyway)"

                  # Give mopidy time to reconnect to snapserver and start playback
                  # (defaultplaylist autoplay should kick in on mopidy startup).
                  # Recovery success criterion: mopidy reports "playing".
                  # We don't require snapserver=playing because snapserver's HTTP API
                  # is unreliable and would cause false "did not recover" outcomes.
                  sleep 30
                  m_after=$(probe_mopidy)
                  ss_after=$(probe_snapserver)
                  echo "after restart: mopidy=$m_after snapserver=$ss_after"

                  if [ "$m_after" = "playing" ]; then
                    notify "snapcast-watchdog" "low" "white_check_mark,radio" \
                      "Recovered. Mopidy=playing, snapserver=$ss_after."
                    exit 0
                  fi

                  notify "snapcast-watchdog" "high" "rotating_light,radio" \
                    "Restart did not recover (mopidy=$m_after, snapserver=$ss_after). Manual intervention needed."
                  exit 1
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 128Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
