---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: outpost-restarter
  namespace: security
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: outpost-restarter
  namespace: security
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: outpost-restarter
  namespace: security
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: outpost-restarter
subjects:
  - kind: ServiceAccount
    name: outpost-restarter
    namespace: security
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: outpost-restart
  namespace: security
spec:
  schedule: "0 4 */3 * *"
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: outpost-restarter
          restartPolicy: OnFailure
          containers:
            - name: restart
              image: bitnami/kubectl:latest@sha256:d80c09afa570a14cf6d32ca09ca610b5701eb0a08c655b5bb820194b218078eb
              command:
                - kubectl
                - rollout
                - restart
                - deployment/ak-outpost-proxy-outpost
                - -n
                - security
