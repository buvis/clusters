---
name: Update flux @home

on:
  workflow_dispatch:
  schedule:
  - cron: "44 4 * * *"

jobs:
  components:
    runs-on: ubuntu-latest
    steps:
    - name: Generate app token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
      id: app-token
      with:
        app-id: ${{ secrets.BOT_APP_ID }}
        private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
    - name: Check out code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        token: ${{ steps.app-token.outputs.token }}
    - name: Setup Flux CLI
      uses: fluxcd/flux2/action@e833099e1d9af9e684d99b046894a3bc14977a60 # main
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Update Flux components
      id: update
      run: |
        UGLY_VERSION="$(flux -v)"
        VERSION="v${UGLY_VERSION#*flux version }"
        flux install --version="${VERSION}" \
          --export > ./cluster-home/operations/flux-system/gotk-components.yaml
        echo "flux_version=${VERSION}" >> $GITHUB_OUTPUT
    - name: Create pull request for Flux update
      id: create-pr
      uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
      with:
        token: ${{ steps.app-token.outputs.token }}
        branch: "flux/update-${{ steps.update.outputs.flux_version }}"
        delete-branch: true
        title: "Update flux components to ${{ steps.update.outputs.flux_version }} @home"
        signoff: true
        committer: "${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>"
        author: "${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>"
        assignees: "tbouska"
        commit-message: "Update flux components to ${{ steps.update.outputs.flux_version }} @home"
        body: |
          Release notes: https://github.com/fluxcd/flux2/releases/tag/${{ steps.update.outputs.flux_version }}
        labels: flux/update
    - name: Enable auto-merge
      if: steps.create-pr.outputs.pull-request-operation == 'created' || steps.create-pr.outputs.pull-request-operation == 'updated'
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
        PR_URL: ${{ steps.create-pr.outputs.pull-request-url }}
      run: |
        for attempt in 1 2 3 4 5; do
          if gh pr merge --auto --rebase "$PR_URL"; then
            exit 0
          fi
          delay=$((attempt * 10))
          echo "Attempt ${attempt} to enable auto-merge failed; retrying in ${delay}s"
          sleep "${delay}"
        done
        echo "::error::Failed to enable auto-merge on ${PR_URL} after 5 attempts"
        exit 1
